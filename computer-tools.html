<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💻 Computer Utilities & Encryptor Pro</title>
    <!-- Google Fonts & Font Awesome Icons Links -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">

  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/pages/computer-tools.css">
</head>
<body>
  <div id="site-header-root"></div>


    <div class="calc-container" id="calculator" role="application">
        <div class="toast" id="toast">Copied to Clipboard</div>

        <!-- HEADER -->
        <header class="calc-header">
            <div style="display: flex; align-items: center; gap: 14px;">
                <a href="index.html" class="icon-btn" title="Back to Home Dashboard" style="text-decoration: none;">
                    <i class="fa-solid fa-house" style="font-size: 14px;"></i>
                </a>
                <div class="calc-title">Computer Utilities & Encryptor Pro</div>
            </div>
            <div class="header-controls">
                <button class="icon-btn theme-btn" id="theme-toggle" title="Toggle Layout Theme">
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24"><path d="M12.3 2a10 10 0 0 0-1.9 19.8 10 10 0 0 1-1.1-19.8m.7-2A12 12 0 1 0 24 11.5c0-.4 0-.7-.1-1.1a10 10 0 0 1-11.6-10.4z"/></svg>
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.02.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/></svg>
                </button>
            </div>
        </header>

        <!-- MAIN SCROLLER WORKSPACE -->
        <main class="calc-body-workspace">
            <div class="form-group-item">
                <label for="cryptoInput">Write Message or Password here</label>
                <textarea id="cryptoInput" placeholder="Type your text or secret code here..."></textarea>
            </div>

            <!-- KEY PASS IN FOR CRYPTO LOCK -->
            <div class="form-group-item">
                <label for="secretKey">Secret Key / Password (ताले की चाबी)</label>
                <input type="text" id="secretKey" placeholder="Enter a password to Lock/Unlock your message...">
            </div>
            
            <div class="btn-group">
                <button onclick="processBase64('encode')" class="btn btn-secondary"><i class="fa-solid fa-lock"></i> Hide Text</button>
                <button onclick="processBase64('decode')" class="btn btn-secondary"><i class="fa-solid fa-unlock"></i> Show Text</button>
                <button onclick="processCryptoToggle()" class="btn btn-lock"><i class="fa-solid fa-key"></i> Secure Password Lock</button>
                <button onclick="resetUtilities()" class="btn btn-reset"><i class="fa-solid fa-rotate-left"></i> Reset Utilities</button>
            </div>

            <div class="form-group-item">
                <label>Operational Output</label>
                <div class="output-summary-box">
                    <button onclick="copyOutputContent()" class="copy-output-btn" title="Copy Output to Clipboard"><i class="fa-regular fa-copy"></i></button>
                    <div class="summary-title">Result Output</div>
                    <div id="cryptoOutput" class="output-box">Waiting for execution command...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- ==========================================================================
       4. JAVASCRIPT MASTER MACHINE ENGINE LOGICS
       ========================================================================== */ -->
  <script src="js/pages/computer-tools-engine.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/theme.js"></script>
  
  <div id="site-footer-root"></div>

</body>
</html>
