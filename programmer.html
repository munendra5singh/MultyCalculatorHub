<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Programmer Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">

  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/pages/programmer.css">
</head>
<body>
  <div id="site-header-root"></div>


    <div class="calc-container" id="calculator" role="application">
        <div class="toast" id="toast">Copied to Clipboard</div>

        <header class="calc-header">
            <div style="display: flex; align-items: center; gap: 14px;">
                <a href="index.html" class="icon-btn" title="Back to Home Dashboard" style="text-decoration: none;">
                    <i class="fa-solid fa-house" style="font-size: 15px;"></i>
                </a>
                <div class="calc-title">Programmer Station</div>
            </div>
            <div class="header-controls">
                <button class="icon-btn" id="copy-btn" title="Copy Current Radix Entry">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
                <button class="icon-btn" id="history-toggle" title="Calculation History Log">
                    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.53.85-1.34-3.63-2.16V8h-1.5z"/></svg>
                </button>
                <button class="icon-btn theme-btn" id="theme-toggle" title="Design System Node Sync">
                    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M12.3 2a10 10 0 0 0-1.9 19.8 10 10 0 0 1-1.1-19.8m.7-2A12 12 0 1 0 24 11.5c0-.4 0-.7-.1-1.1a10 10 0 0 1-11.6-10.4z"/></svg>
                    <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.02.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/></svg>
                </button>
            </div>
        </header>

        <div class="calc-body-workspace">
            <section class="calc-screen">
                <div class="screen-history" id="screen-expr"></div>
                <div class="screen-current" id="screen-input">0</div>
            </section>

            <section class="radix-channels" id="radix-container" aria-label="Bases Configuration Monitor">
                <div class="radix-row" data-base="HEX" tabindex="0">
                    <span class="radix-lbl">HEX</span><span class="radix-val" id="val-hex">0</span>
                </div>
                <div class="radix-row active" data-base="DEC" tabindex="0">
                    <span class="radix-lbl">DEC</span><span class="radix-val" id="val-dec">0</span>
                </div>
                <div class="radix-row" data-base="OCT" tabindex="0">
                    <span class="radix-lbl">OCT</span><span class="radix-val" id="val-oct">0</span>
                </div>
                <div class="radix-row" data-base="BIN" tabindex="0">
                    <span class="radix-lbl">BIN</span><span class="radix-val" id="val-bin">0</span>
                </div>
            </section>

            <section class="control-strip">
                <select class="pill-select" id="bit-size-select" title="Change Word Architecture Allocation Bounds">
                    <option value="64">QWORD (64-Bit)</option>
                    <option value="32">DWORD (32-Bit)</option>
                    <option value="16">WORD (16-Bit)</option>
                    <option value="8">BYTE (8-Bit)</option>
                </select>
                <select class="pill-select" id="sign-mode-select" title="Toggle Numerical Representation Formats">
                    <option value="signed">Signed Integer</option>
                    <option value="unsigned">Unsigned Integer</option>
                </select>
            </section>

            <section class="bit-viewer-container" aria-label="Interactive Binary Matrix Stream Mapping Viewer">
                <div class="bit-row" id="bit-matrix-display"></div>
            </section>

            <main class="calc-keypad" id="keypad-grid">
                <button class="btn btn-sci" data-sci="lsh" title="Left Shift (&lt;&lt;)">Lsh</button>
                <button class="btn btn-sci" data-sci="rsh" title="Right Shift (&gt;&gt;)">Rsh</button>
                <button class="btn btn-sci" data-sci="and" title="Bitwise AND (&amp;)">AND</button>
                <button class="btn btn-sci" data-sci="or" title="Bitwise OR (|)">OR</button>
                <button class="btn btn-sci" data-sci="xor" title="Bitwise XOR (^)">XOR</button>
                <button class="btn btn-sci" data-sci="not" title="Bitwise NOT (~)">NOT</button>

                <button class="btn btn-sci" data-sci="rol" title="Rotate Left">ROL</button>
                <button class="btn btn-sci" data-sci="ror" title="Rotate Right">ROR</button>
                <button class="btn btn-sci" data-sci="nand">NAND</button>
                <button class="btn btn-sci" data-sci="nor">NOR</button>
                <button class="btn btn-sci" data-sci="xnor">XNOR</button>
                <button class="btn btn-fn" data-action="ce">CE</button>

                <button class="btn btn-num" data-val="A">A</button>
                <button class="btn btn-num" data-val="B">B</button>
                <button class="btn btn-fn" data-action="ac">AC</button>
                <button class="btn btn-fn" data-action="backspace">⌫</button>
                <button class="btn btn-op" data-op="mod">mod</button>
                <button class="btn btn-op" data-op="div">÷</button>

                <button class="btn btn-num" data-val="C">C</button>
                <button class="btn btn-num" data-val="D">D</button>
                <button class="btn btn-num" data-val="7">7</button>
                <button class="btn btn-num" data-val="8">8</button>
                <button class="btn btn-num" data-val="9">9</button>
                <button class="btn btn-op" data-op="mul">×</button>

                <button class="btn btn-num" data-val="E">E</button>
                <button class="btn btn-num" data-val="F">F</button>
                <button class="btn btn-num" data-val="4">4</button>
                <button class="btn btn-num" data-val="5">5</button>
                <button class="btn btn-num" data-val="6">6</button>
                <button class="btn btn-op" data-op="sub">−</button>

                <button class="btn btn-fn" data-val="(">(</button>
                <button class="btn btn-fn" data-val=")">)</button>
                <button class="btn btn-num" data-val="1">1</button>
                <button class="btn btn-num" data-val="2">2</button>
                <button class="btn btn-num" data-val="3">3</button>
                <button class="btn btn-op" data-op="add">+</button>

                <button class="btn btn-fn" data-action="sign">±</button>
                <button class="btn btn-fn" data-val="." id="btn-decimal">.</button>
                <button class="btn btn-num" data-val="0" style="grid-column: span 2;">0</button>
                <button class="btn btn-eq" id="btn-equals" data-action="equals" style="grid-column: span 2;">=</button>
            </main>
        </div>

        <aside class="history-panel" id="history-panel">
            <div class="history-header">
                <span class="history-title">Calculations History</span>
                <button class="icon-btn" id="history-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="history-list" id="history-list"></div>
            <div class="history-footer">
                <button class="clear-hist-btn" id="clear-history">Flush Storage Log</button>
            </div>
        </aside>
    </div>

  <script src="js/pages/programmer-engine.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/theme.js"></script>

  <div id="site-footer-root"></div>

</body>
</html>
