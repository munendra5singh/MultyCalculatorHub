<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Math Suite Solver</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">

  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/pages/math.css">
</head>
<body>
  <div id="site-header-root"></div>


    <div class="calc-container" id="calculator" role="application">
        <div class="toast" id="toast">Copied to Clipboard</div>

        <header class="calc-header">
            <div style="display: flex; align-items: center; gap: 14px;">
                <a href="index.html" class="icon-btn" title="Back to Home Dashboard" style="text-decoration: none;">
                    <i class="fa-solid fa-house" style="font-size: 15px;"></i>
                </a>
                <div class="calc-title">Math Suite Solver</div>
            </div>
            <div class="header-controls">
                <button class="icon-btn" id="history-toggle" title="Review Calculations Stack History Log">
                    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.53.85-1.34-3.63-2.16V8h-1.5z"/></svg>
                </button>
                <button class="icon-btn theme-btn" id="theme-toggle" title="Toggle System Spectral Theme">
                    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M12.3 2a10 10 0 0 0-1.9 19.8 10 10 0 0 1-1.1-19.8m.7-2A12 12 0 1 0 24 11.5c0-.4 0-.7-.1-1.1a10 10 0 0 1-11.6-10.4z"/></svg>
                    <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.02.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/></svg>
                </button>
            </div>
        </header>

        <div class="calc-body-workspace">
            <nav class="tabs-nav">
                <button class="tab-btn active" id="tab-btn-numbers" onclick="switchTab('numbers-tab')">Numbers Engine</button>
                <button class="tab-btn" id="tab-btn-equations" onclick="switchTab('equations-tab')">Equations Matrix</button>
                <button class="tab-btn" id="tab-btn-matrix" onclick="switchTab('matrix-tab')">Matrix Lab</button>
            </nav>

            <div id="numbers-tab" class="tab-content active">
                <div class="form-group-item">
                    <label>संख्याएं डालें (कॉमा लगाकर अलग करें):</label>
                    <input type="text" id="num-inputs" value="12, 18, 24" placeholder="उदा. 12, 18, 24">
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="runLCM()">Find LCM</button>
                    <button class="btn btn-secondary" onclick="runGCD()">Find GCD / HCF</button>
                    <button class="btn btn-success" onclick="runPrimeFactors()">Prime Factors</button>
                </div>
            </div>

            <div id="equations-tab" class="tab-content">
                <p style="font-size:0.85rem; color:var(--text-secondary); font-weight: 600;">Quadratic Solver Formula Matrix: <b>ax² + bx + c = 0</b></p>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group-item" style="flex: 1;"><label>Value a</label><input type="number" id="quad-a" value="1"></div>
                    <div class="form-group-item" style="flex: 1;"><label>Value b</label><input type="number" id="quad-b" value="-5"></div>
                    <div class="form-group-item" style="flex: 1;"><label>Value c</label><input type="number" id="quad-c" value="6"></div>
                </div>
                <button class="btn btn-primary" onclick="solveQuadratic()">Solve Equation</button>
            </div>

            <div id="matrix-tab" class="tab-content">
                <div style="display:flex; gap:14px; align-items:center;">
                    <label style="white-space:nowrap;">Matrix Size Structure:</label>
                    <select id="matrix-size" style="width:130px;">
                        <option value="2" selected>2 x 2 Scale</option>
                        <option value="3">3 x 3 Scale</option>
                    </select>
                </div>
                
                <div class="matrix-container">
                    <span style="font-size:0.85rem; font-weight:700; color:var(--text-secondary);">Matrix Determinant Array A</span>
                    <div id="matrix-a-grid" class="matrix-box"></div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="calculateDeterminant()">Find Determinant</button>
                </div>
            </div>

            <div class="output-summary-box">
                <div class="summary-title" id="res-title">Output Result</div>
                <div class="summary-body" id="res-body">इनपुट भरें और ऊपर दिए एक्शन बटन्स पर क्लिक करें।</div>
            </div>
        </div>

        <aside class="history-panel" id="history-panel">
            <div class="history-header">
                <span class="history-title">Calculations History</span>
                <button class="icon-btn" id="history-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="history-list" id="history-list"></div>
            <div class="history-footer">
                <button class="clear-hist-btn" id="clear-history">Flush Memory Storage</button>
            </div>
        </aside>
    </div>

  <script src="js/pages/math-engine.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/theme.js"></script>

  <div id="site-footer-root"></div>

</body>
</html>
