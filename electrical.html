<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Electrical Station</title>
    <!-- Google Fonts & Font Awesome Icons Links -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">
 
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/pages/electrical.css">
</head>
<body>
  <div id="site-header-root"></div>


    <div class="calc-container" id="calculator" role="application">
        <div class="toast" id="toast">Copied to Clipboard</div>

        <!-- HEADER ENGINE -->
        <header class="calc-header">
            <div style="display: flex; align-items: center; gap: 14px;">
                <a href="index.html" class="icon-btn" title="Back to Home Dashboard" style="text-decoration: none;">
                    <i class="fa-solid fa-house" style="font-size: 15px;"></i>
                </a>
                <div class="calc-title">Electrical Station</div>
            </div>
            <div class="header-controls">
                <button class="icon-btn" id="history-toggle" title="Review Calculations Logs History">
                    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.53.85-1.34-3.63-2.16V8h-1.5z"/></svg>
                </button>
                <button class="icon-btn theme-btn" id="theme-toggle" title="Toggle System Spectral Theme">
                    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M12.3 2a10 10 0 0 0-1.9 19.8 10 10 0 0 1-1.1-19.8m.7-2A12 12 0 1 0 24 11.5c0-.4 0-.7-.1-1.1a10 10 0 0 1-11.6-10.4z"/></svg>
                    <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.02.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/></svg>
                </button>
            </div>
        </header>

        <!-- WORKSPACE PANE -->
        <div class="calc-body-workspace">
            
            <!-- SECTION 1: OHM'S LAW -->
            <section class="form-inputs-stack">
                <div class="section-title">⚡ Ohm's Law Solver</div>
                <div class="input-grid-three">
                    <div class="form-group-item">
                        <label>Voltage (V)</label>
                        <input type="number" id="ohm-v" placeholder="Volts (V)">
                    </div>
                    <div class="form-group-item">
                        <label>Current (I)</label>
                        <input type="number" id="ohm-i" placeholder="Amps (A)">
                    </div>
                    <div class="form-group-item">
                        <label>Resistance (R)</label>
                        <input type="number" id="ohm-r" placeholder="Ohms (Ω)">
                    </div>
                </div>
                <button class="btn-action-trigger" onclick="calculateOhmsLaw()">Calculate Ohm's Law</button>
            </section>

            <div class="divider-strip"></div>

            <!-- SECTION 2: COLOR CODE MATRIX -->
            <section class="form-inputs-stack">
                <div class="section-title">🎨 Resistor Color Code (4-Band)</div>
                
                <div class="resistor-display-canvas">
                    <div class="resistor-body">
                        <div class="resistor-band" id="visual-band1"></div>
                        <div class="resistor-band" id="visual-band2"></div>
                        <div class="resistor-band" id="visual-band3"></div>
                        <div class="resistor-band" id="visual-band4"></div>
                    </div>
                </div>

                <div class="input-grid-four">
                    <div class="form-group-item">
                        <label>1st Band</label>
                        <select id="band1">
                            <option value="0" data-color="#000000" style="background:#000; color:#fff;">Black (0)</option>
                            <option value="1" data-color="#964B00" style="background:#964B00; color:#fff;" selected>Brown (1)</option>
                            <option value="2" data-color="#ff0000" style="background:#ff0000; color:#fff;">Red (2)</option>
                            <option value="3" data-color="#ffa500" style="background:#ffa500; color:#000;">Orange (3)</option>
                            <option value="4" data-color="#ffff00" style="background:#ffff00; color:#000;">Yellow (4)</option>
                            <option value="5" data-color="#008000" style="background:#008000; color:#fff;">Green (5)</option>
                            <option value="6" data-color="#0000ff" style="background:#0000ff; color:#fff;">Blue (6)</option>
                            <option value="7" data-color="#ee82ee" style="background:#ee82ee; color:#000;">Violet (7)</option>
                            <option value="8" data-color="#808080" style="background:#808080; color:#fff;">Gray (8)</option>
                            <option value="9" data-color="#ffffff" style="background:#ffffff; color:#000;">White (9)</option>
                        </select>
                    </div>
                    <div class="form-group-item">
                        <label>2nd Band</label>
                        <select id="band2">
                            <option value="0" data-color="#000000" style="background:#000; color:#fff;" selected>Black (0)</option>
                            <option value="1" data-color="#964B00" style="background:#964B00; color:#fff;">Brown (1)</option>
                            <option value="2" data-color="#ff0000" style="background:#ff0000; color:#fff;">Red (2)</option>
                            <option value="3" data-color="#ffa500" style="background:#ffa500; color:#000;">Orange (3)</option>
                            <option value="4" data-color="#ffff00" style="background:#ffff00; color:#000;">Yellow (4)</option>
                            <option value="5" data-color="#008000" style="background:#008000; color:#fff;">Green (5)</option>
                            <option value="6" data-color="#0000ff" style="background:#0000ff; color:#fff;">Blue (6)</option>
                            <option value="7" data-color="#ee82ee" style="background:#ee82ee; color:#000;">Violet (7)</option>
                            <option value="8" data-color="#808080" style="background:#808080; color:#fff;">Gray (8)</option>
                            <option value="9" data-color="#ffffff" style="background:#ffffff; color:#000;">White (9)</option>
                        </select>
                    </div>
                    <div class="form-group-item">
                        <label>Multiplier</label>
                        <select id="band3">
                            <option value="1" data-color="#000000" style="background:#000; color:#fff;">Black (x1)</option>
                            <option value="10" data-color="#964B00" style="background:#964B00; color:#fff;">Brown (x10)</option>
                            <option value="100" data-color="#ff0000" style="background:#ff0000; color:#fff;" selected>Red (x100)</option>
                            <option value="1000" data-color="#ffa500" style="background:#ffa500; color:#000;">Orange (x1k)</option>
                            <option value="10000" data-color="#ffff00" style="background:#ffff00; color:#000;">Yellow (x10k)</option>
                            <option value="100000" data-color="#008000" style="background:#008000; color:#fff;">Green (x100k)</option>
                            <option value="1000000" data-color="#0000ff" style="background:#0000ff; color:#fff;">Blue (x1M)</option>
                        </select>
                    </div>
                    <div class="form-group-item">
                        <label>Tolerance</label>
                        <select id="band4">
                            <option value="5" data-color="#ffd700" style="background:#ffd700; color:#000;" selected>Gold (±5%)</option>
                            <option value="10" data-color="#c08081" style="background:#c0c0c0; color:#000;">Silver (±10%)</option>
                        </select>
                    </div>
                </div>
                <button class="btn-action-trigger" style="background:var(--accent-hover);" onclick="calculateColorCode()">Calculate Resistance</button>
            </section>

            <!-- UNIFORM OUTPUT SCREEN -->
            <div class="output-summary-box">
                <div class="summary-title" id="res-title">Station Output</div>
                <div class="summary-body" id="res-body">कृपया मान दर्ज करें और कैलकुलेट बटन दबाएं।</div>
            </div>
        </div>

        <!-- HISTORY SIDE LOG RETENTION -->
        <aside class="history-panel" id="history-panel">
            <div class="history-header">
                <span class="history-title">Calculations History</span>
                <button class="icon-btn" id="history-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="history-list" id="history-list"></div>
            <div class="history-footer">
                <button class="clear-hist-btn" id="clear-history">Clear History Cache</button>
            </div>
        </aside>
    </div>

    <!-- ==========================================================================
       9. JAVASCRIPT MASTER MODULES
       ========================================================================== */ -->
  <script src="js/pages/electrical-engine.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/theme.js"></script>

  <div id="site-footer-root"></div>

</body>
</html>
