<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Unit Converter</title>
    <!-- Google Fonts & Font Awesome Icons Links -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/pages/unit_converter.css">
</head>
<body>
  <div id="site-header-root"></div>


    <div class="calc-container" id="calculator" role="application">
        <div class="toast" id="toast">Copied to Clipboard</div>

        <!-- HEADER CONTROLS -->
        <header class="calc-header">
            <div style="display: flex; align-items: center; gap: 14px;">
                <a href="index.html" class="icon-btn" title="Back to Home Dashboard" style="text-decoration: none;">
                    <i class="fa-solid fa-house" style="font-size: 15px;"></i>
                </a>
                <div class="calc-title">Converter</div>
            </div>
            <div class="header-controls">
                <button class="icon-btn" id="copy-btn" title="Copy Calculated Result">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
                <button class="icon-btn" id="history-toggle" title="Conversion Log History">
                    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.53.85-1.34-3.63-2.16V8h-1.5z"/></svg>
                </button>
                <button class="icon-btn theme-btn" id="theme-toggle" title="Design Spectrum Node">
                    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M12.3 2a10 10 0 0 0-1.9 19.8 10 10 0 0 1-1.1-19.8m.7-2A12 12 0 1 0 24 11.5c0-.4 0-.7-.1-1.1a10 10 0 0 1-11.6-10.4z"/></svg>
                    <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.41 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0c-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.02.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/></svg>
                </button>
            </div>
        </header>

        <!-- WORKSPACE MAIN BODY -->
        <main class="converter-body">
            <div class="form-group">
                <label for="category-select">Conversion Metric Category</label>
                <div class="select-wrapper">
                    <select id="category-select"></select>
                </div>
            </div>

            <div class="form-group">
                <label for="input-value">Enter Value</label>
                <input type="number" id="input-value" value="1" placeholder="Type metric amount...">
            </div>

            <div class="form-group">
                <label for="from-unit-select">From Unit</label>
                <div class="select-wrapper">
                    <select id="from-unit-select"></select>
                </div>
            </div>

            <div class="swap-container">
                <button class="swap-btn" id="swap-units-btn" title="Swap Conversion Positions">
                    <i class="fa-solid fa-arrows-up-down"></i>
                </button>
            </div>

            <div class="form-group">
                <label for="to-unit-select">To Unit</label>
                <div class="select-wrapper">
                    <select id="to-unit-select"></select>
                </div>
            </div>

            <div class="form-group">
                <label>Calculated Equivalent Output</label>
                <div class="output-card">
                    <div class="output-value" id="output-display">0</div>
                </div>
            </div>

            <div class="config-row">
                <div class="form-group">
                    <label for="precision-select">Decimal Precision</label>
                    <div class="select-wrapper">
                        <select id="precision-select">
                            <option value="2">2 Places</option>
                            <option value="4" selected>4 Places</option>
                            <option value="6">6 Places</option>
                            <option value="8">8 Places</option>
                            <option value="12">12 Places</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="data-standard-wrapper" style="display:none;">
                    <label for="data-standard-select">Data Mode Scale</label>
                    <div class="select-wrapper">
                        <select id="data-standard-select">
                            <option value="1000">Decimal (1000)</option>
                            <option value="1024" selected>Binary (1024)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="info-card" id="formula-card">
                <div class="info-title">Mathematical Formula Matrix</div>
                <div id="formula-text" style="font-weight: 600;">Processing formula logic...</div>
            </div>

            <div class="action-row">
                <button class="btn-action btn-clear" id="clear-btn"><i class="fa-solid fa-trash-can"></i> Clear</button>
                <button class="btn-action btn-convert" id="log-calc-btn"><i class="fa-solid fa-folder-plus"></i> Save Log</button>
            </div>
        </main>

        <!-- LOG RETENTION SIDEBAR HISTORY PANEL -->
        <aside class="history-panel" id="history-panel">
            <div class="history-header">
                <span class="history-title">Conversion Logs</span>
                <button class="icon-btn" id="history-close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="history-list" id="history-list"></div>
            <div class="history-footer">
                <button class="clear-hist-btn" id="clear-history">Flush Conversion Logs</button>
            </div>
        </aside>
    </div>

    <!-- ==========================================================================
       6. JAVASCRIPT CONTROLLER ENGINE
       ========================================================================== */ -->
  <script src="js/pages/unit_converter-engine.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/theme.js"></script>
  <div id="site-footer-root"></div>

</body>
</html>
